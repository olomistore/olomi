name: Deploy to Firebase Preview Channel

on:
  push:
    branches:
      - teste

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ✅ CORREÇÃO: Adicionado 'working-directory' para executar o comando na pasta correta.
      - name: Install dependencies
        run: npm ci
        working-directory: ./functions

      # Este passo pode ser removido, pois não temos um processo de "build" para o front-end.
      # - name: Build project (se necessário)
      #   run: npm run build

      - name: Deploy to Firebase Preview Channel
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}'
          channelId: teste
          projectId: olomi-7816a 
          expires: 7d

name: Deploy to Firebase Hosting on merge
'on':
  push:
    branches:
      - main
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      # ✅ CORREÇÃO: Define a versão do Node.js para ser a mesma do projeto (18)
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      # Agora o 'npm ci' vai funcionar porque as versões são consistentes
      - name: Install Function Dependencies
        run: npm ci
        working-directory: ./functions

      - name: Deploy to Firebase
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_OLOMI_7816A }}'
          channelId: live
          projectId: olomi-7816a

name: Deploy to Firebase on merge
'on':
  push:
    branches:
      - main
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      # ✅ NOVO: Define a versão do Node.js para ser a mesma do projeto (18)
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      # ✅ NOVO: Instala as dependências das Cloud Functions
      # Este passo é essencial e estava em falta.
      - name: Install Function Dependencies
        run: npm ci
        working-directory: ./functions

      # ✅ CORRIGIDO: Este passo agora irá fazer o deploy de TUDO (Hosting e Functions)
      - name: Deploy to Firebase
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_OLOMI_7816A }}'
          channelId: live
          projectId: olomi-7816a
